{% extends 'base.html' %}

{% block title %}Connect AWS{% endblock %}

{% block content %}

<div class="row justify-content-center">

<div class="col-md-6">

<div class="card shadow">

<div class="card-body">

<h2 class="mb-4">Connect AWS Account</h2>

<form method="post">

    {% csrf_token %}

    {{ form.as_p }}

    <button class="btn btn-success w-100">
        Connect AWS
    </button>

</form>

</div>

</div>

</div>

</div>

{% endblock %}
